name: Generate Animations (Snake + Pac-Man)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🐍 Snake (dark otimizado)
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: lucasba07
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=blue
            dist/snake.gif

      # 🟡 Pac-Man
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: lucasba07

      # 📂 Organizar arquivos
      - name: Move Pac-Man
        run: |
          mkdir -p dist
          cp pacman-contribution-graph.svg dist/ || true

      # 🚀 Deploy
      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "update animations"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
